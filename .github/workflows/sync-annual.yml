name: Data Sync — Annual (schools + WA crime)

on:
  schedule:
    # 03:00 UTC on 15 March (ACARA data typically released Feb/Mar each year)
    - cron: "0 3 15 3 *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source ID to run (or 'annual' for all)"
        default: "annual"
        required: false

jobs:
  sync:
    name: Sync annual data sources
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WA_CRIME_EXCEL_URL: ${{ secrets.WA_CRIME_EXCEL_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync ACARA school data
        run: npx tsx scripts/sync/run.ts acara-schools
        continue-on-error: true

      - name: Sync crime stats (WA)
        run: npx tsx scripts/sync/run.ts crime-wa
        continue-on-error: true

      - name: Sync ABS 2021 Census demographics
        run: npx tsx scripts/sync/run.ts abs-census
        continue-on-error: true

      - name: Sync ABS SA2 median house + unit prices (QLD/WA/NT/TAS/ACT)
        run: npx tsx scripts/sync/run.ts sales-abs
        continue-on-error: true

      - name: Sync rental affordability index (SGS Economics RAI by postcode)
        run: npx tsx scripts/sync/run.ts housing-rai
        continue-on-error: true
