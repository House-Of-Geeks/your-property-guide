<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" fill="none" role="img" aria-label="Selling your home illustration">
  <defs>
    <linearGradient id="sl-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f6f4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#A96DAA" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="sl-house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>

  <rect x="0" y="80" width="320" height="115" fill="url(#sl-sky)"/>

  <!-- Distant treeline -->
  <g opacity="0.18">
    <ellipse cx="40" cy="170" rx="45" ry="13" fill="#5c2d5e"/>
    <ellipse cx="290" cy="170" rx="40" ry="11" fill="#5c2d5e"/>
  </g>

  <!-- Distant rear roofline -->
  <path d="M188 162 L240 116 L292 162 Z" fill="#5c2d5e" opacity="0.28"/>

  <!-- Main house -->
  <path d="M92 132 L170 68 L248 132 L248 188 L92 188 Z" fill="url(#sl-house)"/>
  <path d="M84 132 L170 64 L256 132" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>

  <!-- Chimney: vertical sides, sloped bottom seated on the roof slope -->
  <polygon points="222,72 235,72 235,115 222,105" fill="#1f2937"/>
  <!-- Cap, sits flush above chimney top -->
  <rect x="219" y="68" width="19" height="5" fill="#1f2937"/>
  <!-- Light smoke wisp -->
  <path d="M228 65 Q225 56 230 48 Q235 40 230 34" stroke="#5c2d5e" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Door, primary aubergine (selling = considered, sophisticated) -->
  <path d="M156 148 L156 188 L188 188 L188 148 Q188 144 184 144 L160 144 Q156 144 156 148 Z" fill="#5c2d5e"/>
  <circle cx="182" cy="170" r="1.6" fill="#f7f6f4"/>

  <!-- Steps -->
  <rect x="152" y="186" width="40" height="3" fill="#5c2d5e" opacity="0.7"/>

  <!-- Left window, soft interior glow -->
  <g>
    <rect x="108" y="142" width="30" height="30" fill="#f7f6f4"/>
    <rect x="108" y="142" width="30" height="30" fill="#FBBF77" opacity="0.30"/>
    <line x1="123" y1="142" x2="123" y2="172" stroke="#1f2937" stroke-width="1.2"/>
    <line x1="108" y1="157" x2="138" y2="157" stroke="#1f2937" stroke-width="1.2"/>
    <rect x="108" y="142" width="30" height="30" stroke="#1f2937" stroke-width="1.5" fill="none"/>
    <rect x="105" y="172" width="36" height="3" fill="#1f2937"/>
  </g>

  <!-- Right window -->
  <g>
    <rect x="208" y="142" width="30" height="30" fill="#f7f6f4"/>
    <rect x="208" y="142" width="30" height="30" fill="#FBBF77" opacity="0.30"/>
    <line x1="223" y1="142" x2="223" y2="172" stroke="#1f2937" stroke-width="1.2"/>
    <line x1="208" y1="157" x2="238" y2="157" stroke="#1f2937" stroke-width="1.2"/>
    <rect x="208" y="142" width="30" height="30" stroke="#1f2937" stroke-width="1.5" fill="none"/>
    <rect x="205" y="172" width="36" height="3" fill="#1f2937"/>
  </g>

  <!-- For-sale sign on a slim post, replaces the gimmicky text-lines -->
  <g>
    <!-- Post -->
    <rect x="48" y="118" width="2.5" height="72" fill="#1f2937"/>
    <!-- Sign panel, slightly tilted via transform -->
    <g transform="rotate(-3 50 138)">
      <rect x="20" y="120" width="60" height="40" rx="3" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
      <!-- "For Sale" header bar -->
      <rect x="20" y="120" width="60" height="11" rx="3" fill="#5c2d5e"/>
      <rect x="20" y="125" width="60" height="6" fill="#5c2d5e"/>
      <!-- Mock photo area -->
      <rect x="24" y="135" width="34" height="20" fill="#A96DAA" opacity="0.45"/>
      <!-- Two short lines hinting at agent name and contact -->
      <line x1="61" y1="139" x2="76" y2="139" stroke="#1f2937" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="61" y1="145" x2="76" y2="145" stroke="#1f2937" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
      <line x1="61" y1="151" x2="72" y2="151" stroke="#1f2937" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
    </g>
  </g>

  <!-- Subtle ground line -->
  <line x1="0" y1="190" x2="320" y2="190" stroke="#1f2937" stroke-width="1.2"/>
</svg>
