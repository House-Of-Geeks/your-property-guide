<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" fill="none" role="img" aria-label="Calculator illustration">
  <defs>
    <linearGradient id="calc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f6f4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#A96DAA" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="calc-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>

  <rect x="0" y="60" width="320" height="135" fill="url(#calc-bg)"/>

  <!-- Sheet of paper behind, slightly tilted -->
  <g transform="rotate(-4 80 130)">
    <rect x="20" y="60" width="120" height="140" rx="3" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <!-- Header bar -->
    <rect x="20" y="60" width="120" height="14" fill="#5c2d5e"/>
    <!-- Mock rows -->
    <line x1="32" y1="88" x2="124" y2="88" stroke="#1f2937" stroke-width="1.2" opacity="0.7"/>
    <line x1="32" y1="100" x2="108" y2="100" stroke="#1f2937" stroke-width="1.2" opacity="0.45"/>
    <line x1="32" y1="112" x2="124" y2="112" stroke="#1f2937" stroke-width="1.2" opacity="0.7"/>
    <line x1="32" y1="124" x2="92" y2="124" stroke="#1f2937" stroke-width="1.2" opacity="0.45"/>
    <line x1="32" y1="136" x2="124" y2="136" stroke="#1f2937" stroke-width="1.2" opacity="0.7"/>
    <!-- Total bar -->
    <rect x="32" y="158" width="92" height="20" fill="#DD3C70" opacity="0.18"/>
    <text x="78" y="172" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#5c2d5e">total</text>
  </g>

  <!-- Calculator device, foreground right -->
  <g transform="translate(168, 56)">
    <rect x="0" y="0" width="124" height="148" rx="10" fill="url(#calc-body)"/>
    <!-- Display screen -->
    <rect x="10" y="10" width="104" height="32" rx="4" fill="#FBBF77" opacity="0.18"/>
    <rect x="10" y="10" width="104" height="32" rx="4" fill="none" stroke="#5c2d5e" stroke-width="1" opacity="0.4"/>
    <text x="106" y="33" text-anchor="end" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#f7f6f4">$</text>
    <!-- Keypad rows -->
    <g fill="#f7f6f4" opacity="0.85">
      <circle cx="22" cy="62"  r="6.5"/>
      <circle cx="44" cy="62"  r="6.5"/>
      <circle cx="66" cy="62"  r="6.5"/>
      <circle cx="22" cy="86"  r="6.5"/>
      <circle cx="44" cy="86"  r="6.5"/>
      <circle cx="66" cy="86"  r="6.5"/>
      <circle cx="22" cy="110" r="6.5"/>
      <circle cx="44" cy="110" r="6.5"/>
      <circle cx="66" cy="110" r="6.5"/>
      <circle cx="22" cy="134" r="6.5"/>
      <circle cx="44" cy="134" r="6.5"/>
      <circle cx="66" cy="134" r="6.5"/>
    </g>
    <!-- Equals key, accent -->
    <rect x="84" y="56" width="30" height="84" rx="4" fill="#DD3C70"/>
    <text x="99" y="103" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#f7f6f4">=</text>
  </g>

  <!-- Floating percent symbol top-left -->
  <g transform="translate(34, 36)" opacity="0.55">
    <text font-family="Georgia, serif" font-size="22" font-style="italic" fill="#5c2d5e">%</text>
  </g>

  <!-- Subtle ground -->
  <line x1="0" y1="206" x2="320" y2="206" stroke="#1f2937" stroke-width="1" opacity="0.6"/>
</svg>
