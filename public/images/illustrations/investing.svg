<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" fill="none" role="img" aria-label="Property investing illustration">
  <defs>
    <linearGradient id="iv-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f6f4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#8B4A8C" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="iv-spark" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#DD3C70" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#DD3C70" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="iv-house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>

  <rect x="0" y="20" width="320" height="170" fill="url(#iv-sky)"/>

  <!-- Faint baseline grid -->
  <g opacity="0.45">
    <line x1="20" y1="125" x2="305" y2="125" stroke="#5c2d5e" stroke-width="0.5" stroke-dasharray="2 4"/>
    <line x1="20" y1="95" x2="305" y2="95" stroke="#5c2d5e" stroke-width="0.4" stroke-dasharray="1 5"/>
    <line x1="20" y1="65" x2="305" y2="65" stroke="#5c2d5e" stroke-width="0.4" stroke-dasharray="1 5"/>
  </g>

  <!-- Area-fill under the sparkline -->
  <path d="M20 110 C 60 100, 80 88, 110 78 S 170 60, 200 50 S 260 32, 305 18 L 305 125 L 20 125 Z" fill="url(#iv-spark)"/>

  <!-- The sparkline itself -->
  <path d="M20 110 C 60 100, 80 88, 110 78 S 170 60, 200 50 S 260 32, 305 18"
    stroke="#DD3C70" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Latest-point marker with halo -->
  <circle cx="305" cy="18" r="9" fill="#DD3C70" opacity="0.20"/>
  <circle cx="305" cy="18" r="4" fill="#DD3C70"/>
  <circle cx="305" cy="18" r="1.6" fill="#f7f6f4"/>

  <!-- Yield badge near the climb -->
  <g transform="translate(252, 38)">
    <rect x="-22" y="-10" width="44" height="18" rx="9" fill="#5c2d5e"/>
    <text x="0" y="3" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#f7f6f4">+yield</text>
  </g>

  <!-- Row of houses, ascending in size -->
  <!-- House 1 (smallest) -->
  <g>
    <path d="M22 168 L52 145 L82 168 L82 188 L22 188 Z" fill="url(#iv-house)"/>
    <path d="M16 168 L52 143 L88 168" stroke="#1f2937" stroke-width="1.4"/>
    <rect x="44" y="172" width="14" height="16" fill="#5c2d5e"/>
  </g>

  <!-- House 2 -->
  <g>
    <path d="M92 162 L128 132 L164 162 L164 188 L92 188 Z" fill="url(#iv-house)"/>
    <path d="M86 162 L128 130 L170 162" stroke="#1f2937" stroke-width="1.4"/>
    <rect x="120" y="170" width="16" height="18" fill="#5c2d5e"/>
    <rect x="100" y="167" width="13" height="13" fill="#f7f6f4" stroke="#1f2937" stroke-width="1"/>
    <rect x="100" y="167" width="13" height="13" fill="#FBBF77" opacity="0.3"/>
  </g>

  <!-- House 3 -->
  <g>
    <path d="M174 152 L214 115 L254 152 L254 188 L174 188 Z" fill="url(#iv-house)"/>
    <path d="M168 152 L214 113 L260 152" stroke="#1f2937" stroke-width="1.4"/>
    <rect x="204" y="160" width="20" height="28" fill="#DD3C70"/>
    <circle cx="220" cy="178" r="1.5" fill="#f7f6f4"/>
    <rect x="184" y="156" width="14" height="14" fill="#f7f6f4" stroke="#1f2937" stroke-width="1"/>
    <rect x="184" y="156" width="14" height="14" fill="#FBBF77" opacity="0.3"/>
    <rect x="230" y="156" width="14" height="14" fill="#f7f6f4" stroke="#1f2937" stroke-width="1"/>
    <rect x="230" y="156" width="14" height="14" fill="#FBBF77" opacity="0.3"/>
  </g>

  <!-- House 4 (tallest) -->
  <g>
    <path d="M264 140 L296 102 L328 140 L328 188 L264 188 Z" fill="url(#iv-house)"/>
    <path d="M258 140 L296 100 L334 140" stroke="#1f2937" stroke-width="1.4"/>
    <!-- Chimney: vertical sides, sloped bottom on the right roof slope -->
    <polygon points="302,90 313,90 313,122 302,109" fill="#1f2937"/>
    <rect x="299" y="86" width="17" height="4" fill="#1f2937"/>
    <rect x="288" y="160" width="20" height="28" fill="#5c2d5e"/>
    <rect x="270" y="155" width="14" height="14" fill="#f7f6f4" stroke="#1f2937" stroke-width="1"/>
    <rect x="270" y="155" width="14" height="14" fill="#FBBF77" opacity="0.3"/>
    <rect x="312" y="155" width="14" height="14" fill="#f7f6f4" stroke="#1f2937" stroke-width="1"/>
    <rect x="312" y="155" width="14" height="14" fill="#FBBF77" opacity="0.3"/>
  </g>

  <!-- Subtle ground line -->
  <line x1="0" y1="190" x2="320" y2="190" stroke="#1f2937" stroke-width="1.2"/>
</svg>
