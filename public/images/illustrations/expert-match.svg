<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" fill="none" role="img" aria-label="Expert match illustration">
  <defs>
    <linearGradient id="em-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f6f4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#A96DAA" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="em-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>

  <rect x="0" y="60" width="320" height="135" fill="url(#em-bg)"/>

  <!-- Left figure card (you) -->
  <g transform="translate(28, 50)">
    <rect x="0" y="0" width="106" height="140" rx="6" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <!-- Avatar circle -->
    <circle cx="53" cy="46" r="22" fill="#FBBF77" opacity="0.45"/>
    <!-- Stylized head -->
    <circle cx="53" cy="40" r="10" fill="#5c2d5e"/>
    <!-- Stylized shoulders -->
    <path d="M 30 70 Q 53 56, 76 70 L 76 82 Q 53 76, 30 82 Z" fill="#5c2d5e"/>
    <!-- Lines below -->
    <line x1="14" y1="100" x2="92" y2="100" stroke="#1f2937" stroke-width="1.3"/>
    <line x1="14" y1="110" x2="78" y2="110" stroke="#1f2937" stroke-width="1.2" opacity="0.55"/>
    <!-- "you" pill -->
    <g transform="translate(38, 118)">
      <rect x="0" y="0" width="30" height="14" rx="7" fill="#5c2d5e"/>
      <text x="15" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#f7f6f4">you</text>
    </g>
  </g>

  <!-- Right figure card (expert) -->
  <g transform="translate(186, 50)">
    <rect x="0" y="0" width="106" height="140" rx="6" fill="url(#em-card)"/>
    <!-- Avatar circle -->
    <circle cx="53" cy="46" r="22" fill="#DD3C70" opacity="0.30"/>
    <!-- Stylized head -->
    <circle cx="53" cy="40" r="10" fill="#DD3C70"/>
    <!-- Shoulders -->
    <path d="M 30 70 Q 53 56, 76 70 L 76 82 Q 53 76, 30 82 Z" fill="#DD3C70"/>
    <!-- Lines below -->
    <line x1="14" y1="100" x2="92" y2="100" stroke="#f7f6f4" stroke-width="1.3"/>
    <line x1="14" y1="110" x2="78" y2="110" stroke="#f7f6f4" stroke-width="1.2" opacity="0.55"/>
    <!-- "expert" pill -->
    <g transform="translate(34, 118)">
      <rect x="0" y="0" width="38" height="14" rx="7" fill="#DD3C70"/>
      <text x="19" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#f7f6f4">expert</text>
    </g>
  </g>

  <!-- Connecting arc with double-ended arrows -->
  <g stroke="#5c2d5e" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M 134 100 Q 160 70, 186 100"/>
    <path d="M 138 105 L 134 100 L 138 95" stroke-linejoin="round"/>
    <path d="M 182 95 L 186 100 L 182 105" stroke-linejoin="round"/>
  </g>

  <!-- Match badge above the arc -->
  <g transform="translate(160, 64)">
    <circle r="14" fill="#DD3C70"/>
    <path d="M -5 0 L -1 4 L 5 -4" stroke="#f7f6f4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle ground -->
  <line x1="0" y1="206" x2="320" y2="206" stroke="#1f2937" stroke-width="1" opacity="0.6"/>
</svg>
