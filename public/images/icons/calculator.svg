<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" role="img" aria-label="Calculator">
  <!-- Calculator body -->
  <rect x="4" y="3" width="16" height="18" rx="2" fill="#374151" stroke="#1f2937" stroke-width="0.8"/>
  <!-- Display -->
  <rect x="6" y="5" width="12" height="4" rx="1" fill="#FBBF77" opacity="0.30"/>
  <!-- Keys -->
  <g fill="#f7f6f4">
    <circle cx="8"  cy="12.5" r="1"/>
    <circle cx="12" cy="12.5" r="1"/>
    <circle cx="16" cy="12.5" r="1"/>
    <circle cx="8"  cy="16"   r="1"/>
    <circle cx="12" cy="16"   r="1"/>
    <circle cx="8"  cy="19.2" r="1"/>
    <circle cx="12" cy="19.2" r="1"/>
  </g>
  <!-- Equals key, accent -->
  <rect x="14.6" y="14.4" width="3" height="5.6" rx="0.6" fill="#DD3C70"/>
</svg>
