<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none" role="img" aria-label="Property investing article cover" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ci-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f6f4"/>
      <stop offset="100%" stop-color="#8B4A8C" stop-opacity="0.20"/>
    </linearGradient>
    <linearGradient id="ci-spark" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#DD3C70" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#DD3C70" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="ci-house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#ci-bg)"/>

  <!-- Faint baseline grid -->
  <g opacity="0.45">
    <line x1="60" y1="280" x2="760" y2="280" stroke="#5c2d5e" stroke-width="0.8" stroke-dasharray="3 6"/>
    <line x1="60" y1="200" x2="760" y2="200" stroke="#5c2d5e" stroke-width="0.7" stroke-dasharray="2 8"/>
    <line x1="60" y1="120" x2="760" y2="120" stroke="#5c2d5e" stroke-width="0.7" stroke-dasharray="2 8"/>
  </g>

  <!-- Area-fill under sparkline -->
  <path d="M 60 230 C 160 215, 220 195, 300 165 S 460 110, 540 80 S 700 30, 760 12 L 760 280 L 60 280 Z" fill="url(#ci-spark)"/>

  <!-- Main sparkline -->
  <path d="M 60 230 C 160 215, 220 195, 300 165 S 460 110, 540 80 S 700 30, 760 12"
    stroke="#DD3C70" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Latest point marker -->
  <circle cx="760" cy="12" r="20" fill="#DD3C70" opacity="0.20"/>
  <circle cx="760" cy="12" r="9" fill="#DD3C70"/>
  <circle cx="760" cy="12" r="3.5" fill="#f7f6f4"/>

  <!-- Yield badge -->
  <g transform="translate(620, 70)">
    <rect x="-50" y="-20" width="100" height="36" rx="18" fill="#5c2d5e"/>
    <text x="0" y="6" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#f7f6f4">+yield</text>
  </g>

  <!-- House row, ascending -->
  <!-- House 1 smallest -->
  <g>
    <path d="M 60 380 L 130 320 L 200 380 L 200 410 L 60 410 Z" fill="url(#ci-house)"/>
    <path d="M 50 380 L 130 316 L 210 380" stroke="#1f2937" stroke-width="2"/>
    <rect x="115" y="385" width="32" height="32" fill="#5c2d5e"/>
  </g>

  <!-- House 2 -->
  <g>
    <path d="M 230 360 L 320 290 L 410 360 L 410 410 L 230 410 Z" fill="url(#ci-house)"/>
    <path d="M 220 360 L 320 286 L 420 360" stroke="#1f2937" stroke-width="2"/>
    <rect x="305" y="370" width="32" height="40" fill="#5c2d5e"/>
    <rect x="252" y="372" width="26" height="26" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="252" y="372" width="26" height="26" fill="#FBBF77" opacity="0.30"/>
  </g>

  <!-- House 3 -->
  <g>
    <path d="M 440 340 L 540 250 L 640 340 L 640 410 L 440 410 Z" fill="url(#ci-house)"/>
    <path d="M 430 340 L 540 246 L 650 340" stroke="#1f2937" stroke-width="2"/>
    <rect x="520" y="350" width="40" height="60" fill="#DD3C70"/>
    <circle cx="552" cy="380" r="3" fill="#f7f6f4"/>
    <rect x="465" y="350" width="32" height="32" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="465" y="350" width="32" height="32" fill="#FBBF77" opacity="0.30"/>
    <rect x="585" y="350" width="32" height="32" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="585" y="350" width="32" height="32" fill="#FBBF77" opacity="0.30"/>
  </g>

  <!-- House 4 tallest -->
  <g>
    <path d="M 660 320 L 720 250 L 780 320 L 780 410 L 660 410 Z" fill="url(#ci-house)"/>
    <path d="M 650 320 L 720 246 L 790 320" stroke="#1f2937" stroke-width="2"/>
    <!-- Chimney -->
    <polygon points="745,260 758,260 758,300 745,290" fill="#1f2937"/>
    <rect x="743" y="256" width="17" height="5" fill="#1f2937"/>
    <rect x="700" y="350" width="40" height="60" fill="#5c2d5e"/>
    <rect x="668" y="346" width="28" height="28" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="668" y="346" width="28" height="28" fill="#FBBF77" opacity="0.30"/>
    <rect x="746" y="346" width="28" height="28" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="746" y="346" width="28" height="28" fill="#FBBF77" opacity="0.30"/>
  </g>

  <!-- Ground -->
  <line x1="0" y1="412" x2="800" y2="412" stroke="#1f2937" stroke-width="2" opacity="0.6"/>
</svg>
