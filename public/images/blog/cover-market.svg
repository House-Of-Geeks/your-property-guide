<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none" role="img" aria-label="Property market article cover" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f6f4"/>
      <stop offset="100%" stop-color="#EDA3BB" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="cm-house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="cm-spark-fill" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#DD3C70" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#DD3C70" stop-opacity="0.30"/>
    </linearGradient>
    <pattern id="cm-grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#5c2d5e" stroke-width="0.7" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#cm-bg)"/>
  <rect width="800" height="450" fill="url(#cm-grid)"/>

  <!-- Soft accent glow upper-right -->
  <circle cx="650" cy="100" r="180" fill="#DD3C70" opacity="0.10"/>
  <circle cx="650" cy="100" r="120" fill="#DD3C70" opacity="0.14"/>

  <!-- Sparkline area fill -->
  <path d="M 60 320 C 160 290, 220 250, 300 220 S 460 160, 540 130 S 700 70, 760 50 L 760 360 L 60 360 Z" fill="url(#cm-spark-fill)"/>

  <!-- Sparkline -->
  <path d="M 60 320 C 160 290, 220 250, 300 220 S 460 160, 540 130 S 700 70, 760 50"
    stroke="#DD3C70" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Latest point marker -->
  <circle cx="760" cy="50" r="18" fill="#DD3C70" opacity="0.20"/>
  <circle cx="760" cy="50" r="8" fill="#DD3C70"/>
  <circle cx="760" cy="50" r="3" fill="#f7f6f4"/>

  <!-- Distant treeline -->
  <g opacity="0.18">
    <ellipse cx="120" cy="360" rx="100" ry="22" fill="#5c2d5e"/>
    <ellipse cx="650" cy="365" rx="120" ry="20" fill="#5c2d5e"/>
  </g>

  <!-- House row, left to right ascending -->
  <g>
    <!-- House 1 small -->
    <path d="M 50 360 L 110 305 L 170 360 L 170 405 L 50 405 Z" fill="url(#cm-house)"/>
    <path d="M 42 360 L 110 302 L 178 360" stroke="#1f2937" stroke-width="2"/>
    <rect x="98" y="365" width="22" height="40" fill="#5c2d5e"/>
    <rect x="62" y="368" width="22" height="22" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="62" y="368" width="22" height="22" fill="#FBBF77" opacity="0.30"/>
    <rect x="138" y="368" width="22" height="22" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="138" y="368" width="22" height="22" fill="#FBBF77" opacity="0.30"/>
  </g>

  <g>
    <!-- House 2 mid -->
    <path d="M 200 360 L 280 290 L 360 360 L 360 405 L 200 405 Z" fill="url(#cm-house)"/>
    <path d="M 192 360 L 280 286 L 368 360" stroke="#1f2937" stroke-width="2"/>
    <!-- Chimney -->
    <polygon points="320,300 333,300 333,335 320,328" fill="#1f2937"/>
    <rect x="318" y="296" width="17" height="5" fill="#1f2937"/>
    <rect x="265" y="365" width="30" height="40" fill="#DD3C70"/>
    <rect x="218" y="370" width="26" height="26" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="218" y="370" width="26" height="26" fill="#FBBF77" opacity="0.30"/>
    <rect x="318" y="370" width="26" height="26" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="318" y="370" width="26" height="26" fill="#FBBF77" opacity="0.30"/>
  </g>

  <g>
    <!-- House 3 larger -->
    <path d="M 400 360 L 500 270 L 600 360 L 600 405 L 400 405 Z" fill="url(#cm-house)"/>
    <path d="M 392 360 L 500 266 L 608 360" stroke="#1f2937" stroke-width="2"/>
    <!-- Chimney -->
    <polygon points="555,290 568,290 568,332 555,323" fill="#1f2937"/>
    <rect x="553" y="286" width="17" height="5" fill="#1f2937"/>
    <rect x="475" y="365" width="40" height="40" fill="#5c2d5e"/>
    <rect x="425" y="370" width="32" height="32" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="425" y="370" width="32" height="32" fill="#FBBF77" opacity="0.30"/>
    <rect x="540" y="370" width="32" height="32" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="540" y="370" width="32" height="32" fill="#FBBF77" opacity="0.30"/>
  </g>

  <!-- Stat card top-left -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="200" height="100" rx="8" fill="#f7f6f4" stroke="#1f2937" stroke-width="1.6"/>
    <text x="18" y="32" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#5c2d5e">median house</text>
    <text x="18" y="68" font-family="Georgia, serif" font-size="32" fill="#1f2937">$1.24M</text>
    <g transform="translate(18, 78)">
      <rect x="-4" y="0" width="80" height="18" rx="9" fill="#DD3C70" opacity="0.18"/>
      <path d="M 4 13 L 12 5 L 22 9 L 38 -2" stroke="#DD3C70" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="48" y="13" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#5c2d5e">+8.2%</text>
    </g>
  </g>

  <!-- Yield badge top-right -->
  <g transform="translate(620, 200)">
    <rect x="-50" y="-20" width="100" height="36" rx="18" fill="#5c2d5e"/>
    <text x="0" y="6" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#f7f6f4">+yield</text>
  </g>

  <!-- Ground line -->
  <line x1="0" y1="408" x2="800" y2="408" stroke="#1f2937" stroke-width="2" opacity="0.6"/>
</svg>
