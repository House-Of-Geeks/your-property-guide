<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none" role="img" aria-label="Buying property article cover" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cb-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f6f4"/>
      <stop offset="100%" stop-color="#FBBF77" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="cb-house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#cb-bg)"/>

  <!-- Soft accent glow -->
  <circle cx="600" cy="380" r="220" fill="#DD3C70" opacity="0.10"/>
  <circle cx="600" cy="380" r="150" fill="#DD3C70" opacity="0.14"/>

  <!-- Distant treeline -->
  <g opacity="0.18">
    <ellipse cx="120" cy="380" rx="120" ry="30" fill="#5c2d5e"/>
    <ellipse cx="700" cy="380" rx="140" ry="28" fill="#5c2d5e"/>
  </g>

  <!-- Distant rear roofline -->
  <path d="M 80 350 L 200 230 L 320 350 Z" fill="#5c2d5e" opacity="0.28"/>

  <!-- Main house -->
  <path d="M 220 290 L 420 130 L 620 290 L 620 410 L 220 410 Z" fill="url(#cb-house)"/>
  <path d="M 200 290 L 420 122 L 640 290" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>

  <!-- Chimney with sloped bottom -->
  <polygon points="540,140 562,140 562,232 540,212" fill="#1f2937"/>
  <rect x="535" y="132" width="32" height="9" fill="#1f2937"/>

  <!-- Door, accent magenta -->
  <path d="M 388 320 L 388 410 L 452 410 L 452 320 Q 452 312 444 312 L 396 312 Q 388 312 388 320 Z" fill="#DD3C70"/>
  <circle cx="442" cy="372" r="4" fill="#f7f6f4"/>

  <!-- Steps -->
  <rect x="380" y="408" width="80" height="6" fill="#5c2d5e" opacity="0.7"/>
  <rect x="376" y="414" width="88" height="6" fill="#5c2d5e" opacity="0.5"/>

  <!-- Left window -->
  <g>
    <rect x="252" y="304" width="64" height="64" fill="#f7f6f4"/>
    <rect x="252" y="304" width="64" height="64" fill="#FBBF77" opacity="0.35"/>
    <line x1="284" y1="304" x2="284" y2="368" stroke="#1f2937" stroke-width="2.4"/>
    <line x1="252" y1="336" x2="316" y2="336" stroke="#1f2937" stroke-width="2.4"/>
    <rect x="252" y="304" width="64" height="64" stroke="#1f2937" stroke-width="3" fill="none"/>
    <rect x="246" y="368" width="76" height="6" fill="#1f2937"/>
  </g>

  <!-- Right window -->
  <g>
    <rect x="524" y="304" width="64" height="64" fill="#f7f6f4"/>
    <rect x="524" y="304" width="64" height="64" fill="#FBBF77" opacity="0.35"/>
    <line x1="556" y1="304" x2="556" y2="368" stroke="#1f2937" stroke-width="2.4"/>
    <line x1="524" y1="336" x2="588" y2="336" stroke="#1f2937" stroke-width="2.4"/>
    <rect x="524" y="304" width="64" height="64" stroke="#1f2937" stroke-width="3" fill="none"/>
    <rect x="518" y="368" width="76" height="6" fill="#1f2937"/>
  </g>

  <!-- Front shrub -->
  <g opacity="0.85">
    <ellipse cx="296" cy="406" rx="20" ry="14" fill="#5c2d5e" opacity="0.6"/>
    <ellipse cx="316" cy="402" rx="14" ry="11" fill="#5c2d5e" opacity="0.5"/>
  </g>

  <!-- Floating welcome key -->
  <g transform="translate(80, 200)" stroke="#5c2d5e" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.75">
    <circle cx="22" cy="22" r="16"/>
    <line x1="38" y1="22" x2="100" y2="22"/>
    <line x1="80" y1="22" x2="80" y2="34"/>
    <line x1="94" y1="22" x2="94" y2="32"/>
  </g>

  <!-- "FOR SALE" sign top-right -->
  <g transform="translate(660, 80) rotate(-3)">
    <rect x="0" y="0" width="100" height="20" rx="4" fill="#5c2d5e"/>
    <rect x="0" y="0" width="100" height="60" rx="4" fill="none" stroke="#1f2937" stroke-width="2"/>
    <rect x="0" y="20" width="100" height="40" fill="#f7f6f4"/>
    <rect x="8" y="28" width="58" height="24" fill="#A96DAA" opacity="0.45"/>
    <line x1="70" y1="32" x2="92" y2="32" stroke="#1f2937" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="70" y1="40" x2="92" y2="40" stroke="#1f2937" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
    <line x1="70" y1="48" x2="86" y2="48" stroke="#1f2937" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
    <rect x="48" y="60" width="4" height="100" fill="#1f2937"/>
  </g>

  <!-- Ground -->
  <line x1="0" y1="412" x2="800" y2="412" stroke="#1f2937" stroke-width="2" opacity="0.6"/>
</svg>
